version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: classkira-app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost:8080
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=classkira
      - DB_USERNAME=classkira
      - DB_PASSWORD=secret
      - ADMIN_EMAIL=admin@classkira.com
      - ADMIN_PASSWORD=password
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: classkira-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: classkira
      MYSQL_USER: classkira
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootsecret"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
    driver: local
