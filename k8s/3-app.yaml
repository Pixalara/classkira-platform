apiVersion: apps/v1
kind: Deployment
metadata:
  name: classkira-app
  namespace: default
  labels:
    app: classkira-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: classkira-app
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: classkira-app
    spec:
      initContainers:
        # Wait for Cloud SQL to be reachable before starting Apache
        - name: wait-for-db
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              echo "Waiting for Cloud SQL at 34.47.211.129:3306..."
              until nc -z 34.47.211.129 3306; do
                echo "Cloud SQL not ready, retrying in 5s..."
                sleep 5
              done
              echo "Cloud SQL is reachable!"

      containers:
        - name: classkira
          image: asia-south1-docker.pkg.dev/classkira-platform/lms-repo/classkira-app:v8
          ports:
            - containerPort: 80

          # Load all environment variables from Kubernetes secret
          envFrom:
            - secretRef:
                name: classkira-secrets

          # Persistent storage for user uploads and generated PDFs
          volumeMounts:
            - name: laravel-storage
              mountPath: /var/www/html/storage/app
              subPath: app

          # Resource limits
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"

          # Readiness probe
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

          # Liveness probe
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3

      volumes:
        - name: laravel-storage
          persistentVolumeClaim:
            claimName: laravel-storage-pvc

---
# ── Service ──────────────────────────────────────────────────────────
# Changed from LoadBalancer to NodePort
# GKE Ingress requires NodePort — traffic now flows through Ingress
apiVersion: v1
kind: Service
metadata:
  name: classkira-service
  namespace: default
spec:
  type: NodePort          # ← changed from LoadBalancer
  selector:
    app: classkira-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
