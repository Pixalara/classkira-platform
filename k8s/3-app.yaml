apiVersion: apps/v1
kind: Deployment
metadata:
  name: classkira-app
  namespace: default
  labels:
    app: classkira-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: classkira-app
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: classkira-app
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              echo "Waiting for MySQL at mysql-service:3306..."
              until nc -z mysql-service 3306; do
                echo "MySQL not ready, retrying in 5s..."
                sleep 5
              done
              echo "MySQL is reachable!"

      containers:
        - name: classkira
          image: 305042756485.dkr.ecr.us-east-1.amazonaws.com/classkira-platform:latest
          ports:
            - containerPort: 80

          envFrom:
            - secretRef:
                name: classkira-secrets

          volumeMounts:
            - name: laravel-storage
              mountPath: /var/www/html/storage/app
              subPath: app

          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3

      volumes:
        - name: laravel-storage
          persistentVolumeClaim:
            claimName: laravel-storage-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: classkira-service
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: classkira-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
