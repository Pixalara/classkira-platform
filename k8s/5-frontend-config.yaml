# ── FrontendConfig ────────────────────────────────────────────────────
# Forces all HTTP traffic to redirect to HTTPS permanently (301)
apiVersion: networking.gke.io/v1beta1
kind: FrontendConfig
metadata:
  name: classkira-frontend-config
  namespace: default
spec:
  redirectToHttps:
    enabled: true
    responseCodeName: MOVED_PERMANENTLY_DEFAULT
