apiVersion: v1
kind: Secret
metadata:
  name: classkira-secrets
  namespace: default
type: Opaque
stringData:
  APP_NAME: "ClassKira"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_KEY: "base64:REPLACE_WITH_PRODUCTION_APP_KEY"
  APP_URL: "https://classkira.com"

  DB_CONNECTION: "mysql"
  DB_HOST: "mysql-service"
  DB_PORT: "3306"
  DB_DATABASE: "classkira"
  DB_USERNAME: "classkira"
  DB_PASSWORD: "REPLACE_WITH_DATABASE_PASSWORD"

  MYSQL_ROOT_PASSWORD: "REPLACE_WITH_MYSQL_ROOT_PASSWORD"
  MYSQL_DATABASE: "classkira"
  MYSQL_USER: "classkira"
  MYSQL_PASSWORD: "REPLACE_WITH_DATABASE_PASSWORD"

  SESSION_DRIVER: "file"
  SESSION_LIFETIME: "120"
  CACHE_DRIVER: "file"
  QUEUE_CONNECTION: "sync"

  LOG_CHANNEL: "stderr"
  LOG_LEVEL: "error"

  ADMIN_EMAIL: "admin@classkira.com"
  ADMIN_PASSWORD: "REPLACE_WITH_ADMIN_PASSWORD"

  MAIL_MAILER: "smtp"
  MAIL_HOST: "smtp.mailtrap.io"
  MAIL_PORT: "587"
  MAIL_USERNAME: ""
  MAIL_PASSWORD: ""
  MAIL_ENCRYPTION: "tls"
  MAIL_FROM_ADDRESS: "noreply@classkira.com"
  MAIL_FROM_NAME: "ClassKira"

  STRIPE_KEY: ""
  STRIPE_SECRET: ""
  RAZORPAY_KEY: ""
  RAZORPAY_SECRET: ""
  PAYPAL_CLIENT_ID: ""
  PAYPAL_CLIENT_SECRET: ""
  PAYPAL_MODE: "sandbox"

  TWILIO_ACCOUNT_SID: ""
  TWILIO_AUTH_TOKEN: ""
  TWILIO_FROM: ""
