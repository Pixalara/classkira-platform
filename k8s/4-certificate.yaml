# ── Google Managed SSL Certificate ───────────────────────────────────
# GCP auto-provisions and auto-renews this certificate for free
# Status will show "Provisioning" then "Active" once DNS resolves
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: classkira-ssl
  namespace: default
spec:
  domains:
    - classkira.com
    - www.classkira.com
